{% load i18n static %}
<!-- Public navbar for non-authenticated users — Premium Redesign v2 -->
<nav class="navbar-public" id="navbarPublic">
    <div class="navbar-public__container">

        <!-- Left: Logo -->
        <div class="navbar-public__logo-section">
            <a href="/" class="navbar-public__logo-link" aria-label="Fenix - Inicio">
                <img src="{% static 'img/logo sin fondo3.png' %}" alt="Logo Fenix" class="navbar-public__logo-img">
            </a>
        </div>

        <!-- Right: Actions -->
        <div class="navbar-public__actions">
            <!-- Language Selector -->
            <div class="navbar-public__language" id="publicLangContainer" style="position: relative;">
                <button class="navbar-public__action-btn" type="button" id="publicLangBtn" title="{% trans 'Cambiar idioma' %}">
                    <i class="bi bi-globe2"></i>
                    {% get_current_language as CURRENT_LANGUAGE %}
                    {% if CURRENT_LANGUAGE == 'es' %}
                        <span class="navbar-public__action-label">Español</span>
                    {% elif CURRENT_LANGUAGE == 'zh-hans' %}
                        <span class="navbar-public__action-label">中文</span>
                    {% else %}
                        <span class="navbar-public__action-label text-uppercase">{{ CURRENT_LANGUAGE }}</span>
                    {% endif %}
                </button>
                <ul class="navbar-public__dropdown" id="publicLangMenu" style="display: none;">
                    <li>
                        <form action="{% url 'set_language' %}" method="post">
                            {% csrf_token %}
                            <input name="next" type="hidden" value="{{ request.get_full_path }}">
                            <input name="language" type="hidden" value="es">
                            <button type="submit" class="navbar-public__dropdown-item {% if CURRENT_LANGUAGE == 'es' %}active{% endif %}">
                                <img src="https://flagcdn.com/w20/es.png" width="20" alt="ES"> Español
                            </button>
                        </form>
                    </li>
                    <li>
                        <form action="{% url 'set_language' %}" method="post">
                            {% csrf_token %}
                            <input name="next" type="hidden" value="{{ request.get_full_path }}">
                            <input name="language" type="hidden" value="zh-hans">
                            <button type="submit" class="navbar-public__dropdown-item {% if CURRENT_LANGUAGE == 'zh-hans' %}active{% endif %}">
                                <img src="https://flagcdn.com/w20/cn.png" width="20" alt="ZH"> 中文 (简体)
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    const btn = document.getElementById('publicLangBtn');
                    const menu = document.getElementById('publicLangMenu');
                    const container = document.getElementById('publicLangContainer');

                    if (btn && menu && container) {
                        btn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            e.preventDefault();
                            const isOpen = menu.style.display === 'block';
                            menu.style.display = isOpen ? 'none' : 'block';
                        });

                        document.addEventListener('click', function (e) {
                            if (!container.contains(e.target)) {
                                menu.style.display = 'none';
                            }
                        });
                    }
                });
            </script>

            <!-- Divider -->
            <div class="navbar-public__divider"></div>

            <a href="{% url 'accounts:login' %}" class="navbar-public__action-btn" title="{% trans 'Área cliente' %}">
                <i class="bi bi-person-circle"></i>
                <span class="navbar-public__action-label">{% trans "Área cliente" %}</span>
            </a>

            <!-- Contacto — Ocultar si ya estamos en la página de contacto -->
            {% if request.resolver_match.url_name != 'public_contact' %}
            <a href="{% url 'public_contact' %}" class="navbar-public__action-btn navbar-public__action-btn--orange" title="{% trans 'Contacto' %}">
                <i class="bi bi-chat-dots-fill"></i>
                <span class="navbar-public__action-label">{% trans "Contacto" %}</span>
            </a>
            {% endif %}
        </div>
    </div>
</nav>
