{% load static i18n %}
<!-- WhatsApp Branded Chat Widget -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
    :root {
        --wa-green: #25D366;
        --wa-dark-green: #128C7E;
        --wa-light-green: #DCF8C6;
        --wa-shadow: 0 4px 12px rgba(0,0,0,0.15);
    }

    #whatsapp-fab-container {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #whatsapp-fab {
        width: 60px;
        height: 60px;
        background-color: var(--wa-green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--wa-shadow);
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
    }

    #whatsapp-fab:hover {
        transform: scale(1.1);
        background-color: var(--wa-dark-green);
    }

    #whatsapp-fab.active {
        transform: rotate(90deg);
        background-color: #f1f1f1;
    }

    #whatsapp-fab.active svg {
        fill: #333;
    }

    /* Chat Window */
    #whatsapp-chat-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 320px;
        background: #fff;
        border-radius: 12px;
        box-shadow: var(--wa-shadow);
        overflow: hidden;
        display: none;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s ease;
    }

    #whatsapp-chat-window.active {
        display: block;
        opacity: 1;
        transform: translateY(0);
    }

    /* Header */
    .wa-chat-header {
        background-color: var(--wa-dark-green);
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .wa-chat-header img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: white;
        object-fit: cover;
        padding: 2px;
    }

    .wa-chat-info h4 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
    }

    .wa-chat-status {
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0.9;
    }

    .wa-chat-status::before {
        content: "";
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        display: inline-block;
    }

    /* Body */
    .wa-chat-body {
        padding: 20px;
        background-color: #e5ddd5;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
        min-height: 100px;
    }

    .wa-chat-bubble {
        background: white;
        padding: 12px;
        border-radius: 0 12px 12px 12px;
        font-size: 14px;
        line-height: 1.4;
        color: #333;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        position: relative;
    }

    /* Footer */
    .wa-chat-footer {
        padding: 15px;
        background: white;
        text-align: center;
    }

    .wa-chat-btn {
        background-color: var(--wa-green);
        color: white !important;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: 600;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.3s ease;
        border: none;
        width: 100%;
        justify-content: center;
    }

    .wa-chat-btn:hover {
        background-color: var(--wa-dark-green);
    }
</style>

<div id="whatsapp-fab-container">
    <!-- Chat Window -->
    <div id="whatsapp-chat-window" class="animate__animated">
        <div class="wa-chat-header">
            <img src="{% static 'img/logo.jpeg' %}" alt="Fénix Logo">
            <div class="wa-chat-info">
                <h4>Fénix</h4>
                <div class="wa-chat-status">{% trans "En línea" %}</div>
            </div>
        </div>
        <div class="wa-chat-body">
            <div class="wa-chat-bubble animate__animated animate__fadeInLeft">
                {% blocktrans %}Hola, gracias por contactar con Fénix 😊. <br><br>En breve uno de nuestros comerciales se pondrá en contacto con usted para ofrecerle una atención personalizada.{% endblocktrans %}
            </div>
        </div>
        <div class="wa-chat-footer">
            <button class="wa-chat-btn" onclick="startWhatsAppChat('{{ WHATSAPP_PHONE|default:'34624149250' }}', 'Hola, gracias por contactar con Fénix 😊. En breve uno de nuestros comerciales se pondrá en contacto con usted para ofrecerle una atención personalizada.')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                {% trans "Abrir WhatsApp" %}
            </button>
        </div>
    </div>

    <!-- Toggle Button -->
    <button id="whatsapp-fab" onclick="toggleWhatsAppChat()" title="{% trans '¿Necesitas ayuda?' %}">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
        </svg>
    </button>
</div>

<script src="{% static 'js/whatsapp.js' %}"></script>
