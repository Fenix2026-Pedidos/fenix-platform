name: Django CI Check

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup environment variables for CI
      run: |
        echo "SECRET_KEY=dummy-secret-key-for-github-actions-only" >> $GITHUB_ENV
        echo "DEBUG=True" >> $GITHUB_ENV
        # Force the use of SQLite during CI tests so it doesn't try to connect to Supabase
        echo "USE_SQLITE_DEV=True" >> $GITHUB_ENV
        echo "EMAIL_HOST_USER=dummy" >> $GITHUB_ENV
        echo "EMAIL_HOST_PASSWORD=dummy" >> $GITHUB_ENV

    - name: Django System Check
      run: |
        python manage.py check
        
    - name: Compile ALL Templates
      run: |
        python manage.py test_templates
